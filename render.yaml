services:
  - type: web
    name: forsaken-site
    env: node
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GIST_ID
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: SITE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
